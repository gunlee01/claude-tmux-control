name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test and package
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Check docs
        run: python scripts/check_docs.py
      - name: Compile Python
        run: python -m py_compile claude_tmux_control.py scripts/stream_question.py scripts/web_chat_client.py scripts/check_docs.py
      - name: Run tests
        run: PYTHONDONTWRITEBYTECODE=1 python -m unittest discover -s tests
      - name: Build wheel
        run: python -m pip wheel . -w /tmp/ctc-wheel-test --no-deps

  docker:
    name: Docker build and CLI smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t claude-tmux-control-ci -f docker/Dockerfile .
      - name: Check CLI in image
        run: docker run --rm -e CTC_SKIP_CLAUDE_PREFLIGHT=1 claude-tmux-control-ci ctc --help
