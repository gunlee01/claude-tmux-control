name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test and package
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Check docs
        run: python scripts/check_docs.py
      - name: Compile Python
        run: python -m py_compile claude_tmux_control.py transcript_events.py scripts/stream_question.py scripts/web_chat_client.py scripts/check_docs.py scripts/check_import_boundaries.py scripts/check_package_install.py scripts/refactor_contract_check.py
      - name: Check import boundaries
        run: python scripts/check_import_boundaries.py
      - name: Run tests
        run: PYTHONDONTWRITEBYTECODE=1 python -m unittest discover -s tests
      - name: Build wheel
        run: python -m pip wheel . -w /tmp/ctc-wheel-test --no-deps

  docker:
    name: Docker refactor contract smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Docker refactor contract
        run: CTC_DOCKER_IMAGE=claude-tmux-control-ci scripts/docker_refactor_contract_check.sh
